name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04 # Linux x64
          - os: ubuntu-24.04-arm # Linux arm64
          - os: windows-latest # Windows x64
          - os: windows-11-arm # Windows arm64
          - os: macos-latest # macOS (Apple Silicon)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        # Retry: the ARM package mirror (ports.ubuntu.com) is occasionally
        # unreachable from the runners, which is transient.
        run: |
          for attempt in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y \
              libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
              libxkbcommon-dev libspeechd-dev && exit 0
            echo "apt attempt $attempt failed; retrying in 20s"; sleep 20
          done
          echo "apt failed after 5 attempts"; exit 1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

      - name: Build (release, no bundling)
        working-directory: src-tauri
        run: cargo build --release
