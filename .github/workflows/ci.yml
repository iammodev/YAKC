name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04 # Linux x64
          - os: ubuntu-24.04-arm # Linux arm64
          - os: windows-latest # Windows x64
          - os: windows-11-arm # Windows arm64
          - os: macos-13 # macOS x64
          - os: macos-latest # macOS arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libxkbcommon-dev libspeechd-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

      - name: Build (release, no bundling)
        working-directory: src-tauri
        run: cargo build --release
